name: CI

# Validation for pull requests and pushes to non-main branches. Pushes to main
# are handled by deploy.yml (which re-runs this same test suite before deploying),
# so main is excluded here to avoid running everything twice.
on:
  pull_request:
    branches: ['**']
  push:
    branches-ignore: ['main']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, test & build
    uses: ./.github/workflows/test.yml
    secrets: inherit
