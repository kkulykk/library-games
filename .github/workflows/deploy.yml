name: Deploy

# Deploy to GitHub Pages — ONLY on merge/push to main (or a manual run against
# main). It first re-runs the full lint/test/e2e/build suite via the reusable
# Test workflow and deploys only if every job passes, so main is always green
# before a deploy goes out.
on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-progress Pages deploy; queue instead (GitHub's recommended
# setting for the pages environment).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Lint, test & build
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      upload_pages: true

  deploy:
    name: Deploy
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
